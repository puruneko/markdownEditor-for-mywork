name: Test

on:
  push:
    branches: [main, feature/obsidian-plugin]
  pull_request:
    branches: [main]

jobs:
  test-unit:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  test-e2e:
    name: Obsidian E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run Obsidian E2E tests
        run: xvfb-run --auto-servernum npm run test:obs:e2e
        env:
          # Obsidianのベータ版テストが必要な場合に設定
          # OBSIDIAN_EMAIL: ${{ secrets.OBSIDIAN_EMAIL }}
          # OBSIDIAN_PASSWORD: ${{ secrets.OBSIDIAN_PASSWORD }}
